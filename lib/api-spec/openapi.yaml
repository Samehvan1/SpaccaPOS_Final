openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Spacca POS API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Barista authentication
  - name: drinks
    description: Drink management
  - name: ingredients
    description: Ingredient management
  - name: orders
    description: Order management
  - name: stock
    description: Stock management
  - name: dashboard
    description: Dashboard summaries
  - name: settings
    description: Application settings management
  - name: discounts
    description: Discount and coupon management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: baristaLogin
      tags: [auth]
      summary: Login with PIN
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid PIN

  /auth/logout:
    post:
      operationId: baristaLogout
      tags: [auth]
      summary: Logout
      responses:
        "204":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated

  /drinks:
    get:
      operationId: listDrinks
      tags: [drinks]
      summary: List all drinks
      parameters:
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: active
          schema:
            type: boolean
        - in: query
          name: includeSlots
          schema:
            type: boolean
        - in: query
          name: branchId
          schema:
            type: integer
      responses:
        "200":
          description: List of drinks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Drink"
    post:
      operationId: createDrink
      tags: [drinks]
      summary: Create a drink
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDrinkBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Drink"

  /drinks/{id}:
    get:
      operationId: getDrink
      tags: [drinks]
      summary: Get a drink with its ingredient slots
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: query
          name: branchId
          schema:
            type: integer
      responses:
        "200":
          description: Drink with slots
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DrinkDetail"
        "404":
          description: Not found
    patch:
      operationId: updateDrink
      tags: [drinks]
      summary: Update a drink
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: query
          name: branchId
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDrinkBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Drink"
    delete:
      operationId: deleteDrink
      tags: [drinks]
      summary: Delete a drink
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: query
          name: branchId
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /drinks/{id}/price:
    post:
      operationId: calculateDrinkPrice
      tags: [drinks]
      summary: Calculate price with customizations (side-effect free)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: query
          name: branchId
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PriceCalculationBody"
      responses:
        "200":
          description: Price breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceBreakdown"

  /ingredients:
    get:
      operationId: listIngredients
      tags: [ingredients]
      summary: List all ingredients
      parameters:
        - in: query
          name: type
          schema:
            type: string
        - in: query
          name: active
          schema:
            type: boolean
      responses:
        "200":
          description: List of ingredients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ingredient"
    post:
      operationId: createIngredient
      tags: [ingredients]
      summary: Create a new ingredient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIngredientBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ingredient"

  /ingredients/import-csv:
    post:
      operationId: importInventoryCsv
      tags: [admin]
      summary: Wipe current inventory and import from Inventory2026.csv
      responses:
        "200":
          description: Import successful
        "500":
          description: Import failed

  /ingredients/{id}:
    get:
      operationId: getIngredient
      tags: [ingredients]
      summary: Get ingredient with options
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: query
          name: branchId
          schema:
            type: integer
      responses:
        "200":
          description: Ingredient with options
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngredientDetail"
        "404":
          description: Not found
    patch:
      operationId: updateIngredient
      tags: [ingredients]
      summary: Update an ingredient
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: query
          name: branchId
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateIngredientBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ingredient"
    delete:
      operationId: deleteIngredient
      tags: [ingredients]
      summary: Delete an ingredient
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: query
          name: branchId
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
        "400":
          description: In use
  /ingredients/{id}/options:
    post:
      operationId: createIngredientOption
      tags: [ingredients]
      summary: Add an option to an ingredient
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: query
          name: branchId
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIngredientOptionBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngredientOption"

  /ingredients/{id}/options/{optionId}:
    patch:
      operationId: updateIngredientOption
      tags: [ingredients]
      summary: Update an ingredient option
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: query
          name: branchId
          schema:
            type: integer
        - in: path
          name: optionId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateIngredientOptionBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngredientOption"
    delete:
      operationId: deleteIngredientOption
      tags: [ingredients]
      summary: Remove an option from an ingredient
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: query
          name: branchId
          schema:
            type: integer
        - in: path
          name: optionId
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /ingredients/{id}/restock:
    post:
      operationId: restockIngredient
      tags: [stock]
      summary: Restock an ingredient
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: query
          name: branchId
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RestockBody"
      responses:
        "200":
          description: Restocked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ingredient"

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders
      parameters:
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: startDate
          schema:
            type: string
            format: date
        - in: query
          name: endDate
          schema:
            type: string
            format: date
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: offset
          schema:
            type: integer
        - in: query
          name: branchId
          schema:
            type: integer
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrderDetail"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Place a new order (full transaction)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderBody"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDetail"
        "400":
          description: Validation or stock error

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order detail
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: query
          name: branchId
          schema:
            type: integer
      responses:
        "200":
          description: Order with items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDetail"
        "404":
          description: Not found

  /orders/{id}/status:
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      summary: Advance order status (kitchen display)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: query
          name: branchId
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatusBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /order-items/{id}/ready:
    patch:
      operationId: markOrderItemReady
      tags: [orders]
      summary: Mark a specific order item as ready
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: query
          name: branchId
          schema:
            type: integer
      responses:
        "200":
          description: Item marked ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /stock/movements:
    get:
      operationId: listStockMovements
      tags: [stock]
      summary: List stock movements ledger
      parameters:
        - in: query
          name: ingredientId
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: offset
          schema:
            type: integer
      responses:
        "200":
          description: Stock movements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StockMovement"

  /stock/adjustments:
    post:
      operationId: createStockAdjustment
      tags: [stock]
      summary: Create manual stock adjustment or waste entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StockAdjustmentBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockMovement"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get today's sales summary
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/active-orders:
    get:
      operationId: getActiveOrders
      tags: [dashboard]
      summary: Get active orders for various screens
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, paid, in_progress, ready]
        - in: query
          name: branchId
          schema:
            type: integer
      responses:
        "200":
          description: Active orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrderDetail"

  /dashboard/low-stock:
    get:
      operationId: getLowStockIngredients
      tags: [dashboard]
      summary: Get ingredients below low stock threshold
      responses:
        "200":
          description: Low stock ingredients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ingredient"

  /users:
    get:
      operationId: listUsers
      tags: [admin]
      summary: List all users
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserDetail"
    post:
      operationId: createUser
      tags: [admin]
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDetail"

  /users/{id}:
    patch:
      operationId: updateUser
      tags: [admin]
      summary: Update a user
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: query
          name: branchId
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDetail"
    delete:
      operationId: deleteUser
      tags: [admin]
      summary: Delete a user
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: query
          name: branchId
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /admin/activity-logs:
    get:
      operationId: listActivityLogs
      tags: [admin]
      summary: List activity logs
      parameters:
        - in: query
          name: userId
          schema:
            type: integer
        - in: query
          name: action
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: offset
          schema:
            type: integer
      responses:
        "200":
          description: List of activity logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityLog"

  /admin/permissions:
    get:
      operationId: listPermissions
      tags: [admin]
      summary: List all available permissions
      responses:
        "200":
          description: List of permissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Permission"


  /dashboard/sales-by-category:
    get:
      operationId: getSalesByCategory
      tags: [dashboard]
      summary: Get sales grouped by drink category
      parameters:
        - in: query
          name: days
          schema:
            type: integer
        - in: query
          name: startDate
          schema:
            type: string
            format: date
        - in: query
          name: endDate
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Sales by category
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategorySales"

  /dashboard/top-drinks:
    get:
      operationId: getTopDrinks
      tags: [dashboard]
      summary: Get top selling drinks
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: days
          schema:
            type: integer
        - in: query
          name: startDate
          schema:
            type: string
            format: date
        - in: query
          name: endDate
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Top drinks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopDrink"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get application settings
      parameters:
        - in: query
          name: scope
          schema:
            type: string
            enum: [global, user]
      responses:
        "200":
          description: List of settings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Setting"
    patch:
      operationId: updateSettings
      tags: [settings]
      summary: Update multiple settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSettingsBody"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Setting"

  /discounts:
    get:
      operationId: listDiscounts
      tags: [discounts]
      summary: List all discounts
      responses:
        "200":
          description: List of discounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Discount"
    post:
      operationId: createDiscount
      tags: [discounts]
      summary: Create a discount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDiscountBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Discount"

  /discounts/{id}:
    patch:
      operationId: updateDiscount
      tags: [discounts]
      summary: Update a discount
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: query
          name: branchId
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDiscountBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Discount"
    delete:
      operationId: deleteDiscount
      tags: [discounts]
      summary: Delete a discount
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: query
          name: branchId
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /admin/branches:
    get:
      operationId: listBranches
      tags: [admin]
      summary: List all branches
      responses:
        "200":
          description: List of branches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Branch"
    post:
      operationId: createBranch
      tags: [admin]
      summary: Create a new branch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBranchBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Branch"

  /admin/branches/{id}:
    patch:
      operationId: updateBranch
      tags: [admin]
      summary: Update a branch
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBranchBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Branch"
    delete:
      operationId: deleteBranch
      tags: [admin]
      summary: Delete a branch
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /discounts/validate/{code}:
    get:
      operationId: validateDiscount
      tags: [discounts]
      summary: Validate a discount code
      parameters:
        - in: path
          name: code
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Discount details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Discount"
        "404":
          description: Invalid code

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        role:
          type: string
          enum: [admin, barista, frontdesk, cashier, pickup, stockcontrol]
        branchId:
          type: ["integer", "null"]
        branch:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
      required:
        - id
        - name
        - role

    LoginBody:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required:
        - username
        - password

    LoginResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
      required:
        - user

    UserDetail:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        username:
          type: string
        role:
          type: string
        branchId:
          type: ["integer", "null"]
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - username
        - role
        - isActive

    Branch:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        location:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name

    CreateBranchBody:
      type: object
      properties:
        name:
