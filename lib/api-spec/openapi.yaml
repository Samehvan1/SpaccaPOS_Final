openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Spacca POS API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Barista authentication
  - name: drinks
    description: Drink management
  - name: ingredients
    description: Ingredient management
  - name: orders
    description: Order management
  - name: stock
    description: Stock management
  - name: dashboard
    description: Dashboard summaries

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: baristaLogin
      tags: [auth]
      summary: Login with PIN
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid PIN

  /auth/logout:
    post:
      operationId: baristaLogout
      tags: [auth]
      summary: Logout
      responses:
        "204":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated

  /drinks:
    get:
      operationId: listDrinks
      tags: [drinks]
      summary: List all drinks
      parameters:
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: active
          schema:
            type: boolean
      responses:
        "200":
          description: List of drinks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Drink"
    post:
      operationId: createDrink
      tags: [drinks]
      summary: Create a drink
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDrinkBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Drink"

  /drinks/{id}:
    get:
      operationId: getDrink
      tags: [drinks]
      summary: Get a drink with its ingredient slots
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Drink with slots
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DrinkDetail"
        "404":
          description: Not found
    patch:
      operationId: updateDrink
      tags: [drinks]
      summary: Update a drink
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDrinkBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Drink"
    delete:
      operationId: deleteDrink
      tags: [drinks]
      summary: Delete a drink
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /drinks/{id}/price:
    post:
      operationId: calculateDrinkPrice
      tags: [drinks]
      summary: Calculate price with customizations (side-effect free)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PriceCalculationBody"
      responses:
        "200":
          description: Price breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceBreakdown"

  /ingredients:
    get:
      operationId: listIngredients
      tags: [ingredients]
      summary: List all ingredients
      parameters:
        - in: query
          name: type
          schema:
            type: string
        - in: query
          name: active
          schema:
            type: boolean
      responses:
        "200":
          description: List of ingredients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ingredient"
    post:
      operationId: createIngredient
      tags: [ingredients]
      summary: Create an ingredient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIngredientBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ingredient"

  /ingredients/{id}:
    get:
      operationId: getIngredient
      tags: [ingredients]
      summary: Get ingredient with options
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ingredient with options
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngredientDetail"
        "404":
          description: Not found
    patch:
      operationId: updateIngredient
      tags: [ingredients]
      summary: Update an ingredient
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateIngredientBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ingredient"

  /ingredients/{id}/options:
    post:
      operationId: createIngredientOption
      tags: [ingredients]
      summary: Add an option to an ingredient
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIngredientOptionBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngredientOption"

  /ingredients/{id}/options/{optionId}:
    patch:
      operationId: updateIngredientOption
      tags: [ingredients]
      summary: Update an ingredient option
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: path
          name: optionId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateIngredientOptionBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngredientOption"
    delete:
      operationId: deleteIngredientOption
      tags: [ingredients]
      summary: Remove an option from an ingredient
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: path
          name: optionId
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /ingredients/{id}/restock:
    post:
      operationId: restockIngredient
      tags: [stock]
      summary: Restock an ingredient
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RestockBody"
      responses:
        "200":
          description: Restocked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ingredient"

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders
      parameters:
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: offset
          schema:
            type: integer
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Place a new order (full transaction)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderBody"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDetail"
        "400":
          description: Validation or stock error

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order detail
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order with items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDetail"
        "404":
          description: Not found

  /orders/{id}/status:
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      summary: Advance order status (kitchen display)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatusBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /stock/movements:
    get:
      operationId: listStockMovements
      tags: [stock]
      summary: List stock movements ledger
      parameters:
        - in: query
          name: ingredientId
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: offset
          schema:
            type: integer
      responses:
        "200":
          description: Stock movements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StockMovement"

  /stock/adjustments:
    post:
      operationId: createStockAdjustment
      tags: [stock]
      summary: Create manual stock adjustment or waste entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StockAdjustmentBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockMovement"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get today's sales summary
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/active-orders:
    get:
      operationId: getActiveOrders
      tags: [dashboard]
      summary: Get active orders (pending + in_progress) for kitchen display
      responses:
        "200":
          description: Active orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrderDetail"

  /dashboard/low-stock:
    get:
      operationId: getLowStockIngredients
      tags: [dashboard]
      summary: Get ingredients below low stock threshold
      responses:
        "200":
          description: Low stock ingredients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ingredient"

  /dashboard/sales-by-category:
    get:
      operationId: getSalesByCategory
      tags: [dashboard]
      summary: Get sales grouped by drink category
      parameters:
        - in: query
          name: days
          schema:
            type: integer
      responses:
        "200":
          description: Sales by category
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategorySales"

  /dashboard/top-drinks:
    get:
      operationId: getTopDrinks
      tags: [dashboard]
      summary: Get top selling drinks
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: Top drinks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopDrink"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        role:
          type: string
          enum: [admin, barista, frontdesk]
      required:
        - id
        - name
        - role

    LoginBody:
      type: object
      properties:
        pin:
          type: string
      required:
        - pin

    LoginResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
      required:
        - user

    Ingredient:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        ingredientType:
          type: string
          enum: [coffee, milk, syrup, sauce, sweetener, topping, base, other]
        unit:
          type: string
        costPerUnit:
          type: number
        stockQuantity:
          type: number
        lowStockThreshold:
          type: number
        isActive:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - slug
        - ingredientType
        - unit
        - costPerUnit
        - stockQuantity
        - lowStockThreshold
        - isActive
        - createdAt
        - updatedAt

    IngredientOption:
      type: object
      properties:
        id:
          type: integer
        ingredientId:
          type: integer
        label:
          type: string
        processedQty:
          type: number
        producedQty:
          type: number
        producedUnit:
          type: string
        extraCost:
          type: number
        isDefault:
          type: boolean
        linkedIngredientId:
          type: ["integer", "null"]
        sortOrder:
          type: integer
      required:
        - id
        - ingredientId
        - label
        - processedQty
        - producedQty
        - producedUnit
        - extraCost
        - isDefault
        - sortOrder

    IngredientDetail:
      allOf:
        - $ref: "#/components/schemas/Ingredient"
        - type: object
          properties:
            options:
              type: array
              items:
                $ref: "#/components/schemas/IngredientOption"
          required:
            - options

    CreateIngredientBody:
      type: object
      properties:
        name:
          type: string
        ingredientType:
          type: string
          enum: [coffee, milk, syrup, sauce, sweetener, topping, base, other]
        unit:
          type: string
        costPerUnit:
          type: number
        stockQuantity:
          type: number
        lowStockThreshold:
          type: number
        isActive:
          type: boolean
      required:
        - name
        - ingredientType
        - unit
        - costPerUnit

    UpdateIngredientBody:
      type: object
      properties:
        name:
          type: string
        ingredientType:
          type: string
          enum: [coffee, milk, syrup, sauce, sweetener, topping, base, other]
        unit:
          type: string
        costPerUnit:
          type: number
        stockQuantity:
          type: number
        lowStockThreshold:
          type: number
        isActive:
          type: boolean

    CreateIngredientOptionBody:
      type: object
      properties:
        label:
          type: string
        processedQty:
          type: number
        producedQty:
          type: number
        producedUnit:
          type: string
        extraCost:
          type: number
        isDefault:
          type: boolean
        linkedIngredientId:
          type: ["integer", "null"]
        sortOrder:
          type: integer
      required:
        - label
        - processedQty
        - producedQty
        - producedUnit

    UpdateIngredientOptionBody:
      type: object
      properties:
        label:
          type: string
        processedQty:
          type: number
        producedQty:
          type: number
        producedUnit:
          type: string
        extraCost:
          type: number
        isDefault:
          type: boolean
        linkedIngredientId:
          type: ["integer", "null"]
        sortOrder:
          type: integer

    DrinkIngredientSlot:
      type: object
      properties:
        id:
          type: integer
        drinkId:
          type: integer
        ingredientId:
          type: integer
        slotLabel:
          type: string
        isRequired:
          type: boolean
        defaultOptionId:
          type: ["integer", "null"]
        sortOrder:
          type: integer
        ingredient:
          $ref: "#/components/schemas/IngredientDetail"
      required:
        - id
        - drinkId
        - ingredientId
        - slotLabel
        - isRequired
        - defaultOptionId
        - sortOrder
        - ingredient

    Drink:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        category:
          type: string
        basePrice:
          type: number
        defaultPrice:
          type: number
        imageUrl:
          type: ["string", "null"]
        isActive:
          type: boolean
        prepTimeSeconds:
          type: integer
        cupSizeMl:
          type: ["integer", "null"]
        kitchenStation:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - description
        - category
        - basePrice
        - imageUrl
        - isActive
        - prepTimeSeconds
        - createdAt
        - updatedAt

    DrinkDetail:
      allOf:
        - $ref: "#/components/schemas/Drink"
        - type: object
          properties:
            slots:
              type: array
              items:
                $ref: "#/components/schemas/DrinkIngredientSlot"
          required:
            - slots

    CreateDrinkBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        category:
          type: string
        basePrice:
          type: number
        imageUrl:
          type: string
        isActive:
          type: boolean
        prepTimeSeconds:
          type: integer
        kitchenStation:
          type: string
        slots:
          type: array
          items:
            type: object
            properties:
              ingredientId:
                type: integer
              slotLabel:
                type: string
              isRequired:
                type: boolean
              defaultOptionId:
                type: ["integer", "null"]
              sortOrder:
                type: integer
            required:
              - ingredientId
              - slotLabel
      required:
        - name
        - category
        - basePrice

    UpdateDrinkBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        category:
          type: string
        basePrice:
          type: number
        imageUrl:
          type: string
        isActive:
          type: boolean
        prepTimeSeconds:
          type: integer
        kitchenStation:
          type: string

    PriceCalculationBody:
      type: object
      properties:
        selections:
          type: array
          items:
            type: object
            properties:
              ingredientId:
                type: integer
              optionId:
                type: integer
              subOptionId:
                type: integer
              slotId:
                type: integer
              typeVolumeId:
                type: integer
            required: []
      required:
        - selections

    PriceBreakdown:
      type: object
      properties:
        basePrice:
          type: number
        extras:
          type: array
          items:
            $ref: "#/components/schemas/PriceBreakdownExtrasItem"
        dynamicInfo:
          $ref: "#/components/schemas/PriceBreakdownDynamicInfo"
        total:
          type: number
      required:
        - basePrice
        - extras
        - total

    PriceBreakdownDynamicInfo:
      type: object
      properties:
        slotLabel:
          type: string
        ingredientName:
          type: string
        filledMl:
          type: number
        cost:
          type: number
      required:
        - slotLabel
        - ingredientName
        - filledMl
        - cost

    PriceBreakdownExtrasItem:
      type: object
      properties:
        ingredientId:
          type: integer
        slotLabel:
          type: string
        optionLabel:
          type: string
        extraCost:
          type: number
      required:
        - ingredientId
        - slotLabel
        - optionLabel
        - extraCost

    OrderItemCustomization:
      type: object
      properties:
        id:
          type: integer
        orderItemId:
          type: integer
        ingredientId:
          type: ["integer", "null"]
        optionId:
          type: ["integer", "null"]
        typeVolumeId:
          type: ["integer", "null"]
        consumedQty:
          type: number
        addedCost:
          type: number
        slotLabel:
          type: string
        optionLabel:
          type: string
      required:
        - id
        - orderItemId
        - consumedQty
        - addedCost
        - slotLabel
        - optionLabel

    OrderItem:
      type: object
      properties:
        id:
          type: integer
        orderId:
          type: integer
        drinkId:
          type: integer
        drinkName:
          type: string
        quantity:
          type: integer
        unitPrice:
          type: number
        lineTotal:
          type: number
        specialNotes:
          type: ["string", "null"]
        customizations:
          type: array
          items:
            $ref: "#/components/schemas/OrderItemCustomization"
      required:
        - id
        - orderId
        - drinkId
        - drinkName
        - quantity
        - unitPrice
        - lineTotal
        - specialNotes
        - customizations

    Order:
      type: object
      properties:
        id:
          type: integer
        orderNumber:
          type: string
        baristaId:
          type: integer
        baristaName:
          type: string
        status:
          type: string
          enum: [pending, in_progress, ready, completed, cancelled]
        customerName:
          type: ["string", "null"]
        subtotal:
          type: number
        discount:
          type: number
        total:
          type: number
        paymentMethod:
          type: string
          enum: [cash, card, wallet]
        amountTendered:
          type: ["number", "null"]
        changeDue:
          type: ["number", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - orderNumber
        - baristaId
        - baristaName
        - status
        - customerName
        - subtotal
        - discount
        - total
        - paymentMethod
        - amountTendered
        - changeDue
        - notes
        - createdAt
        - updatedAt

    OrderDetail:
      allOf:
        - $ref: "#/components/schemas/Order"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/OrderItem"
          required:
            - items

    CreateOrderBody:
      type: object
      properties:
        customerName:
          type: string
        paymentMethod:
          type: string
          enum: [cash, card, wallet]
        amountTendered:
          type: number
        notes:
          type: string
        discount:
          type: number
        items:
          type: array
          items:
            type: object
            properties:
              drinkId:
                type: integer
              quantity:
                type: integer
              specialNotes:
                type: string
              selections:
                type: array
                items:
                  type: object
                  properties:
                    ingredientId:
                      type: integer
                    optionId:
                      type: integer
                    subOptionId:
                      type: integer
                    slotId:
                      type: integer
                    typeVolumeId:
                      type: integer
                  required: []
            required:
              - drinkId
              - quantity
              - selections
      required:
        - paymentMethod
        - items

    UpdateOrderStatusBody:
      type: object
      properties:
        status:
          type: string
          enum: [pending, in_progress, ready, completed, cancelled]
      required:
        - status

    StockMovement:
      type: object
      properties:
        id:
          type: integer
        ingredientId:
          type: integer
        ingredientName:
          type: string
